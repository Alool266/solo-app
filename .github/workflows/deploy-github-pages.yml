# Builds Expo web static export and deploys to GitHub Pages.
#
# First time only (website UI): Repository Settings → Pages → Build and deployment → Source: GitHub Actions
# Or from a logged-in machine: gh api "repos/OWNER/REPO/pages" -X POST -f build_type=workflow -f "source[branch]=main" -f "source[path]=/"
name: Deploy web to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Resolve base path for GitHub Pages
        id: base
        shell: bash
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          if [[ "$REPO_NAME" == "$OWNER.github.io" ]]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$REPO_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Export web
        env:
          EXPO_BASE_URL: ${{ steps.base.outputs.path }}
        run: |
          npx expo export --platform web
          touch dist/.nojekyll
          cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
